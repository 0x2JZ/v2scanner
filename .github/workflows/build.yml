name: Build V2Scanner

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  XRAY_VERSION: "v26.2.6"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests pyinstaller pysocks

      - name: Download xray
        run: |
          $url = "https://github.com/XTLS/Xray-core/releases/download/${{ env.XRAY_VERSION }}/Xray-windows-64.zip"
          Invoke-WebRequest -Uri $url -OutFile xray.zip
          Expand-Archive -Path xray.zip -DestinationPath xray_temp
          Copy-Item xray_temp/xray.exe windows_app/xray.exe
          Remove-Item -Recurse xray_temp, xray.zip
        shell: pwsh

      - name: Verify xray
        run: windows_app/xray.exe version

      - name: Install UPX
        run: choco install upx -y
        shell: pwsh

      - name: Build exe
        run: |
          cd windows_app
          pyinstaller build.spec --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: V2Scanner-Windows
          path: windows_app/dist/V2Scanner.exe

  build-macos-arm:
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests pyinstaller pysocks

      - name: Download xray
        run: |
          curl -sL "https://github.com/XTLS/Xray-core/releases/download/${{ env.XRAY_VERSION }}/Xray-macos-arm64-v8a.zip" -o xray.zip
          unzip -o xray.zip xray -d mac_app/
          chmod +x mac_app/xray
          rm xray.zip

      - name: Verify xray
        run: mac_app/xray version

      - name: Build
        run: |
          cd mac_app
          pyinstaller build_mac.spec --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: V2Scanner-macOS-AppleSilicon
          path: mac_app/dist/V2Scanner

  release:
    needs: [build-windows, build-macos-arm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package artifacts
        run: |
          cd artifacts
          if [ -d "V2Scanner-Windows" ]; then
            cd V2Scanner-Windows && zip ../V2Scanner-Windows.zip V2Scanner.exe && cd ..
          fi
          if [ -d "V2Scanner-macOS-AppleSilicon" ]; then
            cd V2Scanner-macOS-AppleSilicon && chmod +x V2Scanner && zip ../V2Scanner-macOS-AppleSilicon.zip V2Scanner && cd ..
          fi

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --repo ${{ github.repository }} --yes 2>/dev/null || true

          ASSETS=""
          for f in artifacts/V2Scanner-Windows.zip artifacts/V2Scanner-macOS-AppleSilicon.zip; do
            [ -f "$f" ] && ASSETS="$ASSETS $f"
          done

          gh release create latest $ASSETS \
            --repo ${{ github.repository }} \
            --title "V2Scanner - Latest Build" \
            --notes "Automated build from main branch (xray ${{ env.XRAY_VERSION }}).

          **Downloads:**
          - **Windows**: V2Scanner-Windows.zip
          - **macOS Apple Silicon (M1/M2/M3/M4)**: V2Scanner-macOS-AppleSilicon.zip

          No Python or dependencies required. Just download, extract, and run." \
            --latest
